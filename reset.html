<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>매수 수첩 새로고침</title>
    <style>
      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: #f5f7f4;
        color: #17211f;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100% - 32px, 420px);
        text-align: center;
      }

      img {
        width: 58px;
        height: 58px;
        object-fit: contain;
      }

      h1 {
        margin: 14px 0 8px;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: #66736f;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="assets/bunnyeap-symbol.png" alt="Bunnyeap" />
      <h1>새 화면을 불러오는 중</h1>
      <p>이전 캐시를 지우고 다시 열고 있습니다.</p>
    </main>
    <script>
      async function resetApp() {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ("caches" in window) {
          const names = await caches.keys();
          await Promise.all(names.map((name) => caches.delete(name)));
        }

        window.location.replace("./?v=8&reset=" + Date.now());
      }

      resetApp();
    </script>
  </body>
</html>
